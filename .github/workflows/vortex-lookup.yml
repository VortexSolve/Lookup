name: 🌀 Vortex Lookup

on:
  issues:
    types: [opened, labeled, reopened]

permissions:
  issues: write
  contents: read

jobs:
  vortex-lookup:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'searchthis')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright requests beautifulsoup4 aiohttp Pillow playwright-stealth==1.0.6
          playwright install chromium
          playwright install-deps chromium

      - name: Parse issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            const q = body.match(/### Text Question\s*\n+([\s\S]*?)(?=\n###|\n---|$)/);
            const img = body.match(/https?:\/\/[^\s)]+/);

            core.setOutput('question', q ? q[1].trim() : '');
            core.setOutput('image_url', img ? img[0] : '');

      - name: Run Vortex
        env:
          QUESTION: ${{ steps.parse.outputs.question }}
          IMAGE_URL: ${{ steps.parse.outputs.image_url }}
        run: python .github/scripts/vortex_lookup.py

      - name: Post result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let answer = fs.readFileSync('/tmp/vortex_answer.md', 'utf8');

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🌀 Result\n\n${answer}`
            });

            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
