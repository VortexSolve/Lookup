name: 🌀 Vortex Lookup

on:
  issues:
    types: [labeled, reopened]


permissions:
  issues: write
  contents: read

jobs:
  vortex-lookup:
    runs-on: ubuntu-latest

    if: |
      github.event.label.name == 'searchthis' ||
      (
        github.event.action == 'reopened' &&
        contains(github.event.issue.labels.*.name, 'searchthis')
      )

    steps:
      # --------------------------------------------------
      # 📦 Checkout
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 🐍 Python setup
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------
      # 📦 Install dependencies (FAST)
      # --------------------------------------------------
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      # --------------------------------------------------
      # 🧠 Parse issue body
      # --------------------------------------------------
      - name: Parse issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // -----------------------------
            // Query type
            // -----------------------------
            const typeMatch = body.match(/### Query Type\s*\n+([^\n]+)/);
            const queryType = typeMatch ? typeMatch[1].trim() : 'Text Question';

            // -----------------------------
            // Text question
            // -----------------------------
            const questionMatch = body.match(/### Text Question\s*\n+([\s\S]*?)(?=\n###|\n---|$)/);
            let question = questionMatch ? questionMatch[1].trim() : '';
            if (question === '_No response_') question = '';

            // -----------------------------
            // Image parsing
            // -----------------------------
            const imageBlockMatch = body.match(/### Image URL or Attachment\s*\n([\s\S]*?)(?=\n###|$)/);
            let imageRaw = imageBlockMatch ? imageBlockMatch[1].trim() : '';
            if (imageRaw === '_No response_') imageRaw = '';

            let imageUrl = '';
            const htmlImg = imageRaw.match(/<img[^>]+src=["']([^"']+)["']/i);
            const mdImg = imageRaw.match(/!\[.*?\]\((https?:\/\/[^\)]+)\)/);

            if (htmlImg) {
              imageUrl = htmlImg[1];
            } else if (mdImg) {
              imageUrl = mdImg[1];
            } else if (imageRaw.startsWith('http')) {
              imageUrl = imageRaw.split('\n')[0].trim();
            }

            console.log("QUESTION:", question);
            console.log("IMAGE:", imageUrl);

            core.setOutput('question', question);
            core.setOutput('image_url', imageUrl);

      # --------------------------------------------------
      # 💬 Post "working" comment
      # --------------------------------------------------
      - name: Post searching message
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "🌀 **Vortex is solving your question...** ⚡"
            });

      # --------------------------------------------------
      # 🚀 Run Vortex
      # --------------------------------------------------
      - name: Run Vortex Engine
        env:
          QUESTION: ${{ steps.parse.outputs.question }}
          IMAGE_URL: ${{ steps.parse.outputs.image_url }}
        run: |
          python .github/scripts/vortex_lookup.py

      # --------------------------------------------------
      # 📤 Post result
      # --------------------------------------------------
      - name: Post result
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let answer = '';
            try {
              answer = fs.readFileSync('/tmp/vortex_answer.md', 'utf8').trim();
            } catch {
              answer = '❌ Failed to read Vortex output.';
            }

            if (!answer) {
              answer = '⚠️ No answer generated.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: answer
            });

      # --------------------------------------------------
      # 🔒 Close issue (clean UX)
      # --------------------------------------------------
      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

      # --------------------------------------------------
      # ❌ Failure handler
      # --------------------------------------------------
      - name: On failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🌀 Vortex Failed

            ❌ Something went wrong.
            
            Possible reasons:
            - Search engines blocked the request
            - AI failed to respond
            - Invalid image URL
            
            Try again by re-adding the label.
            
            ---`
                      });
          
                      await github.rest.issues.update({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        state: 'closed',
                        state_reason: 'not_planned'
                      });
