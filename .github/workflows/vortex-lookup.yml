name: 🌀 Vortex Lookup

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  vortex-lookup:
    name: Run Vortex Lookup Search
    runs-on: ubuntu-latest

    # Only run when the 'searchthis' label is present
    if: contains(github.event.issue.labels.*.name, 'searchthis')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright requests Pillow
          playwright install chromium
          playwright install-deps chromium

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';

            // Extract query type
            const typeMatch = body.match(/### Query Type\s*\n+([^\n]+)/);
            const queryType = typeMatch ? typeMatch[1].trim() : 'Text Question';

            // Extract text question
            const questionMatch = body.match(/### Text Question\s*\n+([\s\S]*?)(?=\n###|\n---|\n_No response_|$)/);
            let question = questionMatch ? questionMatch[1].trim() : '';
            if (question === '_No response_') question = '';

            // Extract image URL
            const imageBlockMatch = body.match(/### Image URL or Attachment\s*\n+([\s\S]*?)(?=\n###|\n---|\n_No response_|$)/);
            let imageRaw = imageBlockMatch ? imageBlockMatch[1].trim() : '';
            if (imageRaw === '_No response_') imageRaw = '';

            // Parse GitHub image embed: ![image](URL) or plain URL
            let imageUrl = '';
            const embedMatch = imageRaw.match(/!\[.*?\]\((https?:\/\/[^\)]+)\)/);
            if (embedMatch) {
              imageUrl = embedMatch[1];
            } else if (imageRaw.startsWith('http')) {
              imageUrl = imageRaw.split('\n')[0].trim();
            }

            console.log(`Query Type: ${queryType}`);
            console.log(`Question: ${question}`);
            console.log(`Image URL: ${imageUrl}`);

            core.setOutput('query_type', queryType);
            core.setOutput('question', question);
            core.setOutput('image_url', imageUrl);

      - name: Post "searching" comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🌀 **Vortex Lookup** is searching Gauth for your answer... please wait!'
            });

      - name: Run Vortex Lookup script
        id: lookup
        env:
          QUERY_TYPE: ${{ steps.parse.outputs.query_type }}
          QUESTION: ${{ steps.parse.outputs.question }}
          IMAGE_URL: ${{ steps.parse.outputs.image_url }}
        run: |
          python .github/scripts/vortex_lookup.py

      - name: Post answer as comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let answer = '';
            try {
              answer = fs.readFileSync('/tmp/vortex_answer.md', 'utf8').trim();
            } catch (e) {
              answer = '❌ Vortex Lookup encountered an error retrieving the answer.';
            }

            if (!answer) {
              answer = '⚠️ **Vortex Lookup** could not find an answer for this query. Please check the input and try again.';
            }

            const body = `## 🌀 Vortex Lookup Result\n\n${answer}\n\n---\n*Answered automatically by [Vortex Lookup](../../blob/main/.github/workflows/vortex-lookup.yml)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Close issue after answering
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });
